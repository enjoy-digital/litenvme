# LiteNVMe pytest configuration.
#
# Disable pytest's assertion rewriting. The HDL tests build Migen designs whose
# anonymous Signals are named by Migen's source-frame tracer (it reads the source line
# where each Signal is created). pytest's assertion rewriting recompiles test modules
# from a modified AST; with multiple HDL test files imported together this can corrupt
# the tracer's view and make a later run_simulation() fail spuriously. Plain asserts
# avoid this; `pytest` and `python3 -m unittest` then behave identically.
[pytest]
addopts = --assert=plain
testpaths = test
